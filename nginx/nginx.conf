# Proxy reverso que termina o TLS e repassa para o gunicorn (serviço web).
#
# O certificado fornecido pela infra deve ser colocado em ./certs (no host),
# que é montado em /etc/nginx/certs. São esperados dois arquivos:
#   fullchain.pem  -> certificado + cadeia intermediária
#   privkey.pem    -> chave privada
# Se a infra entregar com outros nomes, renomeie ou ajuste os caminhos abaixo.

upstream elo_app {
    server web:8000;
}

# HTTP -> redireciona tudo para HTTPS.
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Permite uploads maiores (anexos de projetos, etc.).
    client_max_body_size 25m;

    location / {
        proxy_pass http://elo_app;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Informa ao Django que a conexão original é HTTPS (casado com
        # SECURE_PROXY_SSL_HEADER nas settings), evitando loop de redirect.
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}
