{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'contas/css/cadastro.css' %}">
{% endblock %}

{% block content %}
<h2>Cadastro</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Cadastrar</button>
</form>
<p>Já tem uma conta? <a href="{% url 'login' %}">Faça login aqui</a></p>
{% endblock %}

{% block extra_js %}
<script src="{% static 'contas/js/cadastro.js' %}"></script>
{% endblock %}
