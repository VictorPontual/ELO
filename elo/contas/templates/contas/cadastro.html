{% extends "base.html" %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'contas/css/cadastro.css' %}">
{% endblock %}

{% block content %}
<h2>Cadastro de Pesquisador</h2>
<form method="post" class="cadastro-form">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Cadastrar</button>
</form>
{% endblock %}

{% block extra_js %}
<script src="{% static 'contas/js/cadastro.js' %}"></script>
{% endblock %}
